# Self-hosted Langfuse v2 (lightweight: web + its own Postgres). Local only.
# Start:  docker compose -f docker-compose.langfuse.yml up -d
# UI:     http://localhost:3001  (create a project, copy keys into .env)
# Port 3001 reserved for Langfuse; 3000 is the app frontend (Vite).
services:
  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/postgres
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: change-me-langfuse-secret
      SALT: change-me-langfuse-salt
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  langfuse_pgdata:
